name: Sync GAS snapshot to Cloudflare R2

concurrency:
  group: sync-r2
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions の cron は UTC 基準: 13:00 JST = 04:00 UTC
    - cron: "0 4 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      GAS_URL: ${{ secrets.GAS_URL }}
      SYNC_TIMEOUT_MS: "15000"
      SYNC_MAX_RETRY: "5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 依存があるリポジトリなら npm ci を有効化してください（package-lock.json がある場合）
      # - name: Install deps
      #   run: npm ci

      - name: Build public-data from GAS
        env:
          ENABLE_ARCHIVE_SYNC: "true"
          ARCHIVE_STRICT_SYNC: "true"
        run: node scripts/sync-gas.mjs

      - name: Preflight check (history/meta)
        run: |
          history_count=$(find public-data/history -type f -name '*.json' | wc -l | tr -d ' ')
          echo "History JSON count: ${history_count}"
          if [ "${history_count}" -eq 0 ]; then
            echo "history files are missing"
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');
          const meta = JSON.parse(fs.readFileSync('public-data/meta.json', 'utf8'));
          const history = meta?.history || {};
          const sourceMode = String(history.sourceMode || '');
          const sourceRows = Number(history.sourceRows || 0);
          const files = Number(history.files || 0);
          const multiEntryFiles = Number(history.multiEntryFiles || 0);

          if (sourceMode !== 'live-archive') {
            console.error(`history.sourceMode must be live-archive, got: ${sourceMode}`);
            process.exit(1);
          }
          if (sourceRows <= 0) {
            console.error(`history.sourceRows must be > 0, got: ${sourceRows}`);
            process.exit(1);
          }
          if (files <= 0) {
            console.error(`history.files must be > 0, got: ${files}`);
            process.exit(1);
          }
          if (multiEntryFiles <= 0) {
            console.warn(`warning: history.multiEntryFiles is ${multiEntryFiles}`);
          }

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
            '## sync-r2 preflight',
            `- UTC: ${new Date().toISOString()}`,
            `- history JSON count: ${files}`,
            `- archive source mode: ${sourceMode}`,
            `- archive source rows: ${sourceRows}`,
            `- history files: ${files}`,
            `- history multiEntryFiles: ${multiEntryFiles}`,
            ...(multiEntryFiles <= 0 ? ['- warning: multiEntryFiles is 0'] : []),
            ''
          ].join('\n'));
          NODE

      - name: Install awscli
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi

      - name: Upload songs/gags/meta to R2
        run: |
          for attempt in 1 2 3; do
            set +e
            aws s3 cp public-data/songs.json "s3://$R2_BUCKET/public-data/songs.json" \
              --endpoint-url "$R2_ENDPOINT" \
              --region auto
            songs_rc=$?
            aws s3 cp public-data/gags.json "s3://$R2_BUCKET/public-data/gags.json" \
              --endpoint-url "$R2_ENDPOINT" \
              --region auto
            gags_rc=$?
            aws s3 cp public-data/meta.json "s3://$R2_BUCKET/public-data/meta.json" \
              --endpoint-url "$R2_ENDPOINT" \
              --region auto
            meta_rc=$?
            set -e
    
            if [ "$songs_rc" -eq 0 ] && [ "$gags_rc" -eq 0 ] && [ "$meta_rc" -eq 0 ]; then
              echo "R2 upload succeeded on attempt ${attempt}"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "R2 upload failed on attempt ${attempt}; retrying..."
              sleep $((attempt * 10))
            fi
          done

          echo "R2 upload failed after 3 attempts"
          exit 1

      - name: Upload history files to R2
        run: |
          for attempt in 1 2 3; do
            if aws s3 sync public-data/history "s3://$R2_BUCKET/public-data/history" \
              --endpoint-url "$R2_ENDPOINT" \
              --region auto \
              --delete; then
              echo "History upload succeeded on attempt ${attempt}"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "History upload failed on attempt ${attempt}; retrying..."
              sleep $((attempt * 10))
            fi
          done

          echo "History upload failed after 3 attempts"
          exit 1

      - name: Verify uploaded history files on R2
        run: |
          remote_history_count=$(aws s3 ls "s3://$R2_BUCKET/public-data/history/" \
            --endpoint-url "$R2_ENDPOINT" \
            --region auto \
            --recursive | wc -l | tr -d ' ')
          echo "R2 history object count: ${remote_history_count}"
          if [ "${remote_history_count}" -eq 0 ]; then
            echo "R2 history objects are missing"
            exit 1
          fi
          {
            echo "## sync-r2 post-check"
            echo "- UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- R2 history object count: ${remote_history_count}"
          } >> "$GITHUB_STEP_SUMMARY"
