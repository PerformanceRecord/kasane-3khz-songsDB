name: Sync GAS data

on:
  workflow_dispatch:
    inputs:
      enable_archive_sync:
        description: 'archive sheet も同期する（必要時のみ）'
        required: false
        type: boolean
        default: false
  schedule:
    # GitHub Actions の cron は UTC 基準: 01:00/13:00 JST = 16:00/04:00 UTC
    - cron: '0 16,4 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Validate GAS_URL secret
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
        run: |
          if [ -z "${GAS_URL}" ]; then
            echo "GAS_URL secret is required" >&2
            exit 1
          fi

      - name: Sync data from GAS
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
          ENABLE_ARCHIVE_SYNC: ${{ github.event_name == 'schedule' && 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.enable_archive_sync) || 'false' }}
          ARCHIVE_LIMITS: '5,3,2,1'
          ARCHIVE_PAGE_LIMIT: '2'
          ARCHIVE_MAX_PAGES: '4000'
          ARCHIVE_TOTAL_CAP: '20000'
        run: node scripts/sync-gas.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html public-data/*.json
          git commit -m "chore: sync GAS snapshot"
          git push
