name: Sync GAS data

on:
  workflow_dispatch:
    inputs:
      enable_archive_sync:
        description: 'archive sheet も同期する（必要時のみ）'
        required: false
        type: boolean
        default: false
  schedule:
    # GitHub Actions の cron は UTC 基準: 09:00 JST = 00:00 UTC
    - cron: '0 0 * * *'

concurrency:
  group: sync-gas
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync local main to remote main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate GAS_URL secret
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
        run: |
          if [ -z "${GAS_URL}" ]; then
            echo "GAS_URL secret is required" >&2
            exit 1
          fi

      - name: Sync data from GAS
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
          ENABLE_ARCHIVE_SYNC: ${{ github.event_name == 'schedule' && 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.enable_archive_sync) || 'false' }}
          ARCHIVE_LIMITS: '5,3,2,1'
          ARCHIVE_PAGE_LIMIT: '2'
          ARCHIVE_MAX_PAGES: '4000'
          ARCHIVE_TOTAL_CAP: '20000'
        run: node scripts/sync-gas.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html public-data/

          git status --short

          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            exit 0
          fi

          git commit -m "chore: sync GAS snapshot"

          max_retries=3
          attempt=1
          while [ "$attempt" -le "$max_retries" ]; do
            echo "Push attempt ${attempt}/${max_retries}"

            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase failed"
              git rebase --abort || true
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi

            if [ "$attempt" -lt "$max_retries" ]; then
              echo "Push failed, retrying after short sleep"
              sleep 5
            fi

            attempt=$((attempt + 1))
          done

          echo "Push failed after ${max_retries} attempts"
          exit 1
