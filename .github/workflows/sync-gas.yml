name: Sync GAS data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions の cron は UTC 基準: 01:00/13:00 JST = 16:00/04:00 UTC
    - cron: '0 16,4 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync data from GAS
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
          ENABLE_ARCHIVE_SYNC: "true"
          ARCHIVE_LIMITS: "5,3,2,1"
          ARCHIVE_PAGE_LIMIT: "2"
          ARCHIVE_MAX_PAGES: "4000"
          ARCHIVE_TOTAL_CAP: "20000"
        run: node scripts/sync-gas.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public-data/*.json
          git commit -m "chore: sync GAS snapshot"
          git push
