name: GAS maintenance safeguards

on:
  push:
    branches:
      - agent/harden-maintenance
  pull_request:
    paths:
      - 'google-apps-script-reference/**'
      - 'scripts/apply-maintenance-patch.mjs'
      - 'tests/gas-maintenance.test.mjs'
      - '.github/workflows/gas-maintenance.yml'

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply narrow maintenance patch
        run: node scripts/apply-maintenance-patch.mjs

      - name: Run GAS regression tests
        run: node --test tests/gas-maintenance.test.mjs

      - name: Commit generated maintenance changes
        if: github.event_name == 'push'
        run: |
          if git diff --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add google-apps-script-reference/code.gs google-apps-script-reference/merge-songs-gags-archive.gs
          git commit -m 'Apply GAS maintenance safeguards'
          git push
