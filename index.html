<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <meta name="theme-color" content="#87ceeb">
  <meta name="description" content="Vtuber 花彩音_3kHzの歌唱楽曲を検索・閲覧できるデータベースです。">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="彩興DB">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="彩興DB">
  <meta property="og:title" content="彩興DB">
  <meta property="og:description" content="Vtuber 花彩音_3kHzの歌唱楽曲を検索・閲覧できるデータベースです。">
  <meta property="og:url" content="https://performancerecord.github.io/kasane-3khz-songsDB/">
  <meta property="og:image" content="https://performancerecord.github.io/kasane-3khz-songsDB/assets/icons/app/icon-512.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="彩興DB">
  <meta name="twitter:description" content="Vtuber 花彩音_3kHzの歌唱楽曲を検索・閲覧できるデータベースです。">
  <meta name="twitter:image" content="https://performancerecord.github.io/kasane-3khz-songsDB/assets/icons/app/icon-512.png">
  <link rel="canonical" href="https://performancerecord.github.io/kasane-3khz-songsDB/">
  <link rel="icon" href="https://performancerecord.github.io/kasane-3khz-songsDB/assets/icons/app/icon-192.png" type="image/png" sizes="192x192">
  <link rel="shortcut icon" href="https://performancerecord.github.io/kasane-3khz-songsDB/assets/icons/app/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="https://performancerecord.github.io/kasane-3khz-songsDB/assets/icons/app/apple-touch-icon.png" sizes="180x180">
  <link rel="apple-touch-icon-precomposed" href="https://performancerecord.github.io/kasane-3khz-songsDB/assets/icons/app/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="./site.webmanifest">
  <title>彩興DB</title>
  <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
  <div class="app-shell">
  <!-- 一覧ページ -->
  <div id="page-list" class="page active">
    <div class="list-layout" id="list-layout">
      <div class="card" id="filter-panel">
        <div class="topbar">
          <div class="tabs" role="tablist" aria-label="検索対象">
            <button id="tab-songs" class="tab" role="tab" aria-selected="true"  data-tab="songs">歌唱曲</button>
            <button id="tab-gags"  class="tab" role="tab" aria-selected="false" data-tab="gags">一発ネタ</button>
          </div>
        </div>

        <div class="status-row">
          <div class="muted" id="status">読み込み中…</div>
          <button id="filter-toggle" class="filter-toggle" type="button" aria-expanded="true">表示切替</button>
        </div>
        <div class="server-response filter-collapse-target" id="server-response" aria-live="polite">サーバー状態：＼ﾅｧﾝ／</div>
        <div class="stats-row filter-collapse-target" id="stats-row" aria-live="polite"></div>
        <div class="quick-filter-row filter-collapse-target">
          <div class="quick-filters" id="quick-filters" aria-label="区分で絞り込み"></div>
        </div>
      </div>

      <div class="card result-card">
        <div class="muted" id="hint">検索結果がここに表示されます。</div>
        <div id="results-scroll" class="result-scroll" aria-label="楽曲情報カード一覧">
          <div id="table" style="display:none;"></div>
          <div id="mblist" class="mobile-list" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 履歴ページ -->
  <div id="page-history" class="page">
    <div class="card">
      <div class="history-header">
        <button id="btn-back" class="back">← 戻る</button>
        <div class="history-title" id="hist-title">/</div>
      </div>
      <div class="muted" id="hist-sub">歌唱履歴を新しい順に表示します。</div>
    </div>
    <div class="card" style="margin-top:12px;">
      <div id="hist-list" class="history-list"></div>
      <div id="hist-empty" class="muted" style="display:none;">該当する履歴が見つかりませんでした。</div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">コピーしました</div>
  <button id="to-top" class="to-top" type="button" aria-label="ページ上部へ戻る">↑ 上へ</button>
  <div class="input-dock" aria-label="入力コンソール">
    <div class="input-console">
      <div class="row">
        <input id="q" type="search" placeholder="曲名／アーティスト名で検索" autocomplete="off">
        <button id="clear-search" class="btn btn-subtle" type="button" title="検索条件をクリア">クリア</button>
      </div>
      <div class="dm-wrap" aria-label="弾幕コピー">
        <div class="dm-select-wrap">
          <select id="dm-select" title="弾幕の種類を選択">
            <option value="⚛️🌐ꕤ.‎˖٭*⚛️🌐ꕤ.‎˖٭*⚛️🌐ꕤ.‎˖٭*⚛️🌐ꕤ.‎˖٭*">⚛️🌐ꕤ.‎˖٭（花）</option>
            <option value="⚛️🌐♬*.+⚛️🌐♬*.+⚛️🌐♬*.+⚛️🌐♬*.+">⚛️🌐♬*.+（音符）</option>
            <option value="✨⚛️🌐🎵✨⚛️🌐🎵✨⚛️🌐🎵✨⚛️🌐🎵">✨⚛️🌐🎵（キラ音符）</option>
            <option value="＼ﾅｧﾝ／">＼ﾅｧﾝ／</option>

          </select>
        </div>
        <div class="dm-btn-wrap">
          <button id="dm-copy" class="btn btn-full" type="button" title="選択した弾幕をコピー">コピー</button>
        </div>
      </div>
    </div>
  </div>
  </div>

  <script src="./assets/js/app.js" defer></script>

</body>
</html>
